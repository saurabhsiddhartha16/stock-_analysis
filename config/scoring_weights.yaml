version: "1.0"

# Composite score = growth_weight * growth_score
#                 + momentum_weight * momentum_score
#                 + quality_weight * quality_score
#                 + risk_weight * risk_score     ← negative (penalizes risk)
#
# All individual scores are 0-100 (higher = better for growth/momentum/quality;
# higher = riskier for risk_score).

default_weights:
  growth_score: 0.35
  momentum_score: 0.25
  quality_score: 0.30
  risk_score: -0.20     # Negative: high risk subtracts from composite

# ── Growth score sub-weights ─────────────────────────────────────────────────
growth_sub_weights:
  revenue_cagr_3yr: 0.30
  pat_cagr_3yr: 0.30
  eps_cagr_3yr: 0.25
  analyst_revision_signal: 0.15   # AI output: +1 upgrade / 0 neutral / -1 downgrade

# ── Risk score sub-weights ───────────────────────────────────────────────────
risk_sub_weights:
  debt_equity_normalized: 0.25
  interest_coverage_inverted: 0.20
  beta_normalized: 0.20
  promoter_pledge_pct: 0.20
  auditor_qualification_flag: 0.15

# ── Quality score sub-weights ────────────────────────────────────────────────
quality_sub_weights:
  roe_consistency: 0.25          # Mean ROE / (1 + stddev/mean) over 5 years
  roce_vs_wacc_spread: 0.25      # ROCE minus assumed 12% WACC
  fcf_conversion_ratio: 0.25     # FCF / PAT
  working_capital_trend: 0.15    # YoY improvement in working-capital days
  cash_to_market_cap: 0.10

# ── Momentum score sub-weights ───────────────────────────────────────────────
momentum_sub_weights:
  price_vs_sma50_pct: 0.20
  price_vs_sma200_pct: 0.20
  rsi_positioning: 0.15
  macd_signal_alignment: 0.15
  relative_strength_vs_nifty50_3m: 0.30

# ── Sector-specific weight overrides ─────────────────────────────────────────
sector_overrides:
  BFSI:
    growth_score: 0.40
    quality_score: 0.35
    risk_score: -0.15             # Leverage is structural; penalize less
    risk_sub_weights:
      debt_equity_normalized: 0.10
      interest_coverage_inverted: 0.05
      beta_normalized: 0.25
      promoter_pledge_pct: 0.30
      auditor_qualification_flag: 0.30

  IT:
    momentum_score: 0.30
    quality_sub_weights:
      cash_to_market_cap: 0.20   # IT companies are cash-rich; reward more
      roe_consistency: 0.25
      roce_vs_wacc_spread: 0.25
      fcf_conversion_ratio: 0.20
      working_capital_trend: 0.10

  Infrastructure:
    quality_sub_weights:
      fcf_conversion_ratio: 0.15  # Long gestation projects; FCF less relevant early
      working_capital_trend: 0.25
      roe_consistency: 0.25
      roce_vs_wacc_spread: 0.25
      cash_to_market_cap: 0.10
