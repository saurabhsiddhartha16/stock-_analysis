app:
  name: "NSE Stock Analysis Agent"
  version: "1.0.0"
  timezone: "Asia/Kolkata"
  run_time: "18:30"        # 6:30 PM IST, 1 hour after NSE market close
  log_level: "INFO"
  log_dir: "logs"

data:
  cache_dir: "data/cache"
  reports_dir: "data/reports"
  universe_dir: "data/universe"
  ohlcv_ttl_hours: 24
  fundamentals_yfinance_ttl_hours: 24
  fundamentals_screener_ttl_hours: 168    # 7 days — Screener.in is slow, scrape weekly
  news_ttl_hours: 4
  ai_analysis_ttl_hours: 24

fetching:
  max_concurrent_requests: 10
  request_timeout_seconds: 30
  max_retries: 3
  retry_backoff_factor: 2.0

ai:
  enabled: true
  gemini_model: "gemini-1.5-flash"         # Free tier: 15 RPM, 1M tokens/day
  gemini_api_key_env_var: "GEMINI_API_KEY"
  top_n_for_analysis: 20                   # Analyse top N ranked stocks only
  news_days_lookback: 30                   # Fetch news from last N days
  qualitative_ttl_hours: 48               # Cache synthesis results for 48h

output:
  html_enabled: true
  csv_enabled: true
  email_enabled: true
  top_n_in_report: 50
  top_n_in_email: 15

email:
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  smtp_use_tls: true
  smtp_user_env_var: "EMAIL_USER"
  smtp_pass_env_var: "EMAIL_PASSWORD"
  from_address: "stock-analysis@gmail.com"
  to_addresses:
    - "saurabh.siddhartha0@gmail.com"
  subject_template: "NSE Daily Analysis — {date} — Top: {top_stocks}"

apis:
  gemini_key_env_var: "GEMINI_API_KEY"          # Free — get at aistudio.google.com
